<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Dominoes Scoring App" />
  <meta name="theme-color" content="#f5f0e8" />
  <title>Dominoes Scoring App</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f0e8;
      --surface: #fffef9;
      --border: #d6cfc0;
      --text: #1a1814;
      --text-muted: #7a7368;
      --text-hint: #b0a898;
      --accent: #2d5a3d;
      --accent-light: #e8f2eb;
      --undo-color: #8b2e2e;
      --radius: 12px;
      --radius-sm: 7px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1814;
        --surface: #242018;
        --border: #3a342a;
        --text: #f0ebe0;
        --text-muted: #8a8278;
        --text-hint: #4a4440;
        --accent: #5a9e70;
        --accent-light: #1e2e22;
        --undo-color: #c47a7a;
      }
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Georgia', 'Times New Roman', serif;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      user-select: none;
    }

    .app {
      max-width: 520px;
      margin: 0 auto;
      padding: 16px 12px 24px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
    }

    .title {
      font-size: 16px;
      font-weight: normal;
      letter-spacing: 0.03em;
      color: var(--text);
      font-style: italic;
      margin-bottom: 3px;
    }

    .subtitle {
      font-size: 10px;
      font-family: system-ui, sans-serif;
      font-style: normal;
      color: var(--text-muted);
      line-height: 1.4;
      max-width: 200px;
    }

    .subtitle a {
      color: var(--accent);
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    .header-controls {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .target-wrap {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .target-wrap label {
      font-size: 12px;
      color: var(--text-muted);
      font-family: system-ui, sans-serif;
    }

    select {
      font-size: 13px;
      font-family: system-ui, sans-serif;
      padding: 4px 6px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      outline: none;
    }

    .new-game-btn {
      font-size: 12px;
      font-family: system-ui, sans-serif;
      padding: 5px 10px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-muted);
      cursor: pointer;
    }

    .new-game-btn:active { opacity: 0.6; }

    .players {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      flex: 1;
    }

    .player-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .player-card.winner {
      border-color: var(--accent);
      background: var(--accent-light);
    }

    .player-name-input {
      font-size: 14px;
      font-family: 'Georgia', serif;
      font-style: italic;
      color: var(--text);
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--border);
      text-align: center;
      width: 100%;
      outline: none;
      padding-bottom: 2px;
      -webkit-user-select: text;
      user-select: text;
    }

    .player-name-input::placeholder { color: var(--text-hint); }

    .score-number {
      font-size: 28px;
      font-family: system-ui, sans-serif;
      font-weight: 300;
      color: var(--text);
      letter-spacing: -0.02em;
      line-height: 1;
    }

    .houses {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      justify-content: center;
      min-height: 62px;
      align-content: flex-start;
      width: 100%;
    }

    .last-score {
      font-size: 11px;
      font-family: 'Courier New', monospace;
      color: var(--text-hint);
      min-height: 14px;
    }

    .btn-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 5px;
      width: 100%;
    }

    .score-btn {
      font-size: 13px;
      font-family: system-ui, sans-serif;
      font-weight: 400;
      padding: 8px 0;
      min-height: 42px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .score-btn:active { opacity: 0.6; transform: scale(0.97); }
    .score-btn:disabled { opacity: 0.25; cursor: default; transform: none; }

    .undo-btn {
      font-size: 12px;
      font-family: system-ui, sans-serif;
      padding: 7px 0;
      min-height: 36px;
      width: 100%;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-muted);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .undo-btn:active { opacity: 0.6; transform: scale(0.97); }
    .undo-btn:disabled { opacity: 0.2; cursor: default; transform: none; }

    .winner-label {
      font-size: 12px;
      font-family: system-ui, sans-serif;
      color: var(--accent);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .log-toggle-btn {
      display: block;
      width: 100%;
      text-align: center;
      font-size: 12px;
      font-family: system-ui, sans-serif;
      color: var(--text-hint);
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    .log-area {
      display: none;
      margin-top: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 8px 10px;
      max-height: 200px;
      overflow-y: auto;
    }

    .log-area.open { display: block; }

    .log-entry {
      font-size: 11px;
      font-family: 'Courier New', monospace;
      color: var(--text-muted);
      padding: 3px 0;
      border-bottom: 1px solid var(--border);
    }

    .log-entry:last-child { border-bottom: none; }
    .log-entry.undo-entry { color: var(--undo-color); }
    .log-empty { font-size: 11px; font-family: system-ui, sans-serif; color: var(--text-hint); }
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <div>
        <h1 class="title">Dominoes Scoring App</h1>
        <p class="subtitle">Provided for free by Six Dot Domino Club in Minneapolis. Want to learn dominoes strategy? Check out our book: <a href="https://www.amazon.com/gp/product/B09MBV9DWV/ref=as_li_tl?ie=UTF8&camp=1789&creative=9325&creativeASIN=B09MBV9DWV&linkCode=as2&tag=dominoesboo02-20&linkId=03964fffa1d43eb78200f5b63680597a" target="_blank" rel="noopener">Play Dominoes Like a Champion</a></p>
      </div>
      <div class="header-controls">
        <div class="target-wrap">
          <label for="target-select">To</label>
          <select id="target-select" onchange="state.target = parseInt(this.value)">
            <option value="150">150</option>
            <option value="200" selected>200</option>
            <option value="250">250</option>
          </select>
        </div>
        <button class="new-game-btn" onclick="resetGame()">New game</button>
      </div>
    </header>

    <div class="players">
      <div class="player-card" id="card-0">
        <input class="player-name-input" id="name-0" value="Player 1" maxlength="12" placeholder="Player 1" />
        <div class="score-number" id="score-0">0</div>
        <div class="houses" id="houses-0"></div>
        <div class="last-score" id="last-0"></div>
        <div class="btn-grid" id="btns-0"></div>
        <button class="undo-btn" id="undo-0" onclick="undoLast(0)" disabled>↩ undo</button>
      </div>
      <div class="player-card" id="card-1">
        <input class="player-name-input" id="name-1" value="Player 2" maxlength="12" placeholder="Player 2" />
        <div class="score-number" id="score-1">0</div>
        <div class="houses" id="houses-1"></div>
        <div class="last-score" id="last-1"></div>
        <div class="btn-grid" id="btns-1"></div>
        <button class="undo-btn" id="undo-1" onclick="undoLast(1)" disabled>↩ undo</button>
      </div>
    </div>

    <div class="log-section">
      <button class="log-toggle-btn" onclick="toggleLog()">hide score log</button>
      <div class="log-area open" id="log-area"></div>
    </div>
  </div>

  <script>
    var POINT_VALUES = [5, 10, 15, 20, 25, 30];

    function freshHouse() {
      return { foundation: 0, quadrants: [{t:'empty'},{t:'empty'},{t:'empty'},{t:'empty'}] };
    }

    function deepClone(obj) {
      return JSON.parse(JSON.stringify(obj));
    }

    var state = {
      scores: [0, 0],
      houses: [[freshHouse()], [freshHouse()]],
      lastScore: [null, null],
      history: [[], []],
      target: 200,
      log: [],
      over: false
    };

    function currentHouse(player) {
      return state.houses[player][state.houses[player].length - 1];
    }

    function addPoints(player, pts) {
      if (state.over) return;

      state.history[player].push({
        score: state.scores[player],
        houses: deepClone(state.houses[player]),
        lastScore: state.lastScore[player]
      });

      var remaining = pts;
      while (remaining > 0) {
        var house = currentHouse(player);
        if (house.foundation < 2) {
          house.foundation++;
          remaining -= 5;
          continue;
        }
        var qi = house.quadrants.findIndex(function(q) { return q.t === 'empty' || q.t === 'half'; });
        if (qi === -1) {
          state.houses[player].push(freshHouse());
          continue;
        }
        var q = house.quadrants[qi];
        if (remaining >= 10 && q.t === 'empty') {
          q.t = 'o'; remaining -= 10;
        } else if (remaining >= 5 && q.t === 'empty') {
          q.t = 'half'; remaining -= 5;
        } else if (remaining >= 5 && q.t === 'half') {
          q.t = 'x'; remaining -= 5;
        } else { break; }
      }

      state.scores[player] += pts;
      state.lastScore[player] = pts;

      var name = document.getElementById('name-' + player).value || 'Player ' + (player + 1);
      var ts = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit'});
      state.log.push({ text: ts + '  ' + name + '  +' + pts + '  \u2192 ' + state.scores[player], undo: false });

      updateUI();
      if (state.scores[player] >= state.target) endGame(player);
    }

    function undoLast(player) {
      if (state.history[player].length === 0) return;

      var snap = state.history[player].pop();
      var prevScore = state.scores[player];
      state.scores[player] = snap.score;
      state.houses[player] = snap.houses;
      state.lastScore[player] = snap.lastScore;

      if (state.over) {
        state.over = false;
        [0, 1].forEach(function(p) { setPlayerButtonsDisabled(p, false); });
        [0, 1].forEach(function(p) {
          var card = document.getElementById('card-' + p);
          card.classList.remove('winner');
          var lbl = card.querySelector('.winner-label');
          if (lbl) lbl.remove();
        });
      }

      var name = document.getElementById('name-' + player).value || 'Player ' + (player + 1);
      var ts = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit'});
      var diff = prevScore - snap.score;
      state.log.push({ text: ts + '  ' + name + '  UNDO \u2212' + diff + '  \u2192 ' + snap.score, undo: true });

      updateUI();
    }

    function drawHouseSVG(houseData, size) {
      var ns = 'http://www.w3.org/2000/svg';
      var svg = document.createElementNS(ns, 'svg');
      svg.setAttribute('viewBox', '0 0 ' + size + ' ' + size);
      svg.setAttribute('width', size);
      svg.setAttribute('height', size);
      svg.setAttribute('aria-hidden', 'true');

      var isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      var col = isDark ? '#f0ebe0' : '#1a1814';
      var dimCol = isDark ? '#3a342a' : '#d6cfc0';
      var sw = 1.8, dimSw = 0.8;

      function ln(x1, y1, x2, y2, active) {
        var l = document.createElementNS(ns, 'line');
        l.setAttribute('x1', x1); l.setAttribute('y1', y1);
        l.setAttribute('x2', x2); l.setAttribute('y2', y2);
        l.setAttribute('stroke', active ? col : dimCol);
        l.setAttribute('stroke-width', active ? sw : dimSw);
        l.setAttribute('stroke-linecap', 'round');
        svg.appendChild(l);
      }

      var cx = size / 2, cy = size / 2, ext = size * 0.44;
      ln(cx - ext, cy, cx + ext, cy, houseData.foundation >= 1);
      ln(cx, cy - ext, cx, cy + ext, houseData.foundation >= 2);

      var off = size * 0.24;
      var qc = [
        [cx - off, cy - off],
        [cx + off, cy - off],
        [cx - off, cy + off],
        [cx + off, cy + off]
      ];
      var xr = size * 0.155, cr = size * 0.13;

      houseData.quadrants.forEach(function(q, i) {
        var qx = qc[i][0], qy = qc[i][1];
        if (q.t === 'x') {
          ln(qx - xr, qy - xr, qx + xr, qy + xr, true);
          ln(qx + xr, qy - xr, qx - xr, qy + xr, true);
        } else if (q.t === 'o') {
          var c = document.createElementNS(ns, 'circle');
          c.setAttribute('cx', qx); c.setAttribute('cy', qy);
          c.setAttribute('r', cr); c.setAttribute('fill', 'none');
          c.setAttribute('stroke', col); c.setAttribute('stroke-width', sw);
          svg.appendChild(c);
        } else if (q.t === 'half') {
          ln(qx - xr, qy - xr, qx + xr, qy + xr, true);
        } else {
          ln(qx - xr, qy - xr, qx + xr, qy + xr, false);
          ln(qx + xr, qy - xr, qx - xr, qy + xr, false);
        }
      });

      return svg;
    }

    function renderHouses(player) {
      var container = document.getElementById('houses-' + player);
      container.innerHTML = '';
      state.houses[player].forEach(function(h) {
        container.appendChild(drawHouseSVG(h, 56));
      });
    }

    function setPlayerButtonsDisabled(player, disabled) {
      POINT_VALUES.forEach(function(pts) {
        var btn = document.getElementById('btn' + pts + '-' + player);
        if (btn) btn.disabled = disabled;
      });
    }

    function buildButtons() {
      [0, 1].forEach(function(p) {
        var grid = document.getElementById('btns-' + p);
        grid.innerHTML = '';
        POINT_VALUES.forEach(function(pts) {
          var btn = document.createElement('button');
          btn.className = 'score-btn';
          btn.id = 'btn' + pts + '-' + p;
          btn.textContent = '+' + pts;
          btn.onclick = (function(player, points) {
            return function() { addPoints(player, points); };
          })(p, pts);
          grid.appendChild(btn);
        });
      });
    }

    function updateUI() {
      [0, 1].forEach(function(p) {
        document.getElementById('score-' + p).textContent = state.scores[p];
        renderHouses(p);
        var lastEl = document.getElementById('last-' + p);
        lastEl.textContent = state.lastScore[p] !== null ? 'Last: +' + state.lastScore[p] : '';
        var undoBtn = document.getElementById('undo-' + p);
        undoBtn.disabled = state.history[p].length === 0;
      });
      if (document.getElementById('log-area').classList.contains('open')) renderLog();
    }

    function endGame(winner) {
      state.over = true;
      [0, 1].forEach(function(p) { setPlayerButtonsDisabled(p, true); });
      var card = document.getElementById('card-' + winner);
      card.classList.add('winner');
      if (!card.querySelector('.winner-label')) {
        var lbl = document.createElement('div');
        lbl.className = 'winner-label';
        var name = document.getElementById('name-' + winner).value || 'Player ' + (winner + 1);
        lbl.textContent = name + ' wins';
        card.appendChild(lbl);
      }
      document.getElementById('undo-' + winner).disabled = state.history[winner].length === 0;
    }

    function resetGame() {
      state.scores = [0, 0];
      state.houses = [[freshHouse()], [freshHouse()]];
      state.lastScore = [null, null];
      state.history = [[], []];
      state.over = false;
      state.log = [];
      state.target = parseInt(document.getElementById('target-select').value);
      [0, 1].forEach(function(p) {
        setPlayerButtonsDisabled(p, false);
        document.getElementById('undo-' + p).disabled = true;
        var card = document.getElementById('card-' + p);
        card.classList.remove('winner');
        var lbl = card.querySelector('.winner-label');
        if (lbl) lbl.remove();
      });
      updateUI();
    }

    function renderLog() {
      var area = document.getElementById('log-area');
      if (!state.log.length) {
        area.innerHTML = '<div class="log-empty">No entries yet.</div>';
        return;
      }
      area.innerHTML = state.log.slice().reverse().map(function(e) {
        return '<div class="log-entry' + (e.undo ? ' undo-entry' : '') + '">' + e.text + '</div>';
      }).join('');
    }

    function toggleLog() {
      var area = document.getElementById('log-area');
      var btn = document.querySelector('.log-toggle-btn');
      area.classList.toggle('open');
      btn.textContent = area.classList.contains('open') ? 'hide score log' : 'show score log';
      if (area.classList.contains('open')) renderLog();
    }

    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', updateUI);

    buildButtons();
    updateUI();
  </script>
</body>
</html>
